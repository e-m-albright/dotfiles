# Codex statusline. Codex is declarative, not command-rendered, so this is the
# closest available Pi-shaped ordering: current directory, git, context, 5h/7d
# limits, Fast mode, then model.
theme = "Sublime Snazzy"
status_line = [
  "current-dir",
  "git-branch",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "fast-mode",
  "model-with-reasoning",
]
