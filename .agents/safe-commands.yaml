# Safe Commands for Agentic Coding Tools
# =========================================
# Canonical source of truth for command permissions across agent frameworks.
#
# Setup:
#   Handled automatically by ~/dotfiles/install.sh (requires yq + jq)
#   Generates 3 permission profiles: scout, dev, yolo
#   Select profile:  cc --scout | cc | cc --yolo  (dev is default)
#
# Manual regeneration (after editing this file):
#   ~/dotfiles/.agents/generate-permissions.sh
#
# Profiles (each includes all tiers below it):
#   scout — research & explore. Read files, search, git log, web fetch. No writes.
#   dev   — productive default. Build, test, lint, git, file ops. No cloud/DB/deploys.
#   yolo  — just do it. Everything except sudo and force-push to main.
#
# Format: Each category has commands as string patterns with * wildcards.
# Categories prefixed with _ are metadata (tiers, tools, deny rules).

# =============================================================================
# Tier assignments — which categories belong to which profile
# scout = scout-tier categories only
# dev   = scout + dev-tier categories
# yolo  = scout + dev + yolo-tier categories
# =============================================================================
_tiers:
  scout:
    - readonly
    - git_read
    - github_read
  dev:
    - git_write
    - git_remote
    - github_write
    - node
    - python
    - golang
    - rust
    - taskrunners
    - docker
    - utils_files
    - utils_shell
    - utils_process
    - utils_network_read
    - node_extras
    - python_extras
    - runtimes
    - ai
  yolo:
    - database
    - cloud
    - kubernetes
    - infra_extras
    - utils_destructive
    - utils_macos_system
    - utils_network_write

# =============================================================================
# Non-Bash tool permissions per tier
# =============================================================================
_tools:
  scout:
    - "Edit"
    - "Write"
    - "WebFetch"
    - "WebSearch"
    - "mcp__plugin_context7_context7"
  dev:
    - "mcp__granola"
    - "mcp__linear"
    - "mcp__notion"
    - "mcp__plugin_Notion_notion"
    - "mcp__plugin_playwright_playwright"
  yolo: []

# =============================================================================
# Deny rules per tier (each tier has fewer restrictions)
# =============================================================================
_deny:
  scout:
    - "sudo *"
    - "su *"
    - "rm *"
    - "git push *"
    - "git reset *"
    - "git clean *"
    - "git checkout *"
    - "git rebase *"
    - "kill *"
    - "pkill *"
    - "killall *"
    - "docker *"
    - "kubectl *"
    - "ssh *"
    - "scp *"
    - "rsync *"
    - "eval *"
    - "defaults *"
    - "launchctl *"
    - "osascript *"
    - "diskutil *"
    - "networksetup *"
  dev:
    - "sudo *"
    - "su *"
    - "git push --force *"
    - "git push -f *"
    - "git push origin main --force *"
    - "git push origin master --force *"
    - "git reset --hard *"
    - "docker system prune *"
    - "docker image prune -a *"
    - "killall *"
    - "pkill -9 *"
    - "defaults delete *"
    - "launchctl unload *"
    - "diskutil erase *"
    - "diskutil partitionDisk *"
    - "networksetup *"
    - "dscl . -delete *"
    - "eval *"
    - "osascript *"
  yolo:
    - "sudo *"
    - "su *"
    - "git push --force origin main *"
    - "git push --force origin master *"
    - "git push -f origin main *"
    - "git push -f origin master *"
    - "diskutil erase *"
    - "diskutil partitionDisk *"
    - "networksetup *"
    - "dscl . -delete *"

