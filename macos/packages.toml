# =============================================================================
# Special installers (not plain brew)
# =============================================================================

[special.rust]
method = "rustup"
url = "https://sh.rustup.rs"
args = ["-y"]
zprofile_snippet = '[[ -f "$HOME/.cargo/env" ]] && source "$HOME/.cargo/env"'
note = "Official installer; preferred over Homebrew for version management"

[special.typewhisper]
method = "github_dmg"
flag = "productivity"
repo = "TypeWhisper/typewhisper-mac"
app_name = "TypeWhisper.app"
exclude_asset_patterns = ["daily", "-rc", "plugin"]
note = "On-device voice-to-text (Parakeet ASR + local Gemma cleanup). Replaced Wispr Flow 2026-05-29. No Homebrew cask."

[special.claude_code]
method = "curl_install"
flag = "ai"
url = "https://claude.ai/install.sh"
post_install = "claude install latest"
note = "Tracks `latest`, not the lagging `stable` cask. Migrated off npm global 2026-05-28."

# =============================================================================
# npm globals (no brew formula available / brew formula is wrong package)
# =============================================================================

[[npm_package]]
name = "agent-browser"
flag = "ai"
note = "Browser-automation CLI for AI agents (Tier 2 — shell out, no MCP overhead)"

[[npm_package]]
name = "pinchtab"
flag = "ai"
note = "Browser automation CLI for AI agents"
disabled = true
reason = "Disabled 2026-06-01: experiment; agent-browser is the active browser-automation CLI"

[[npm_package]]
name = "wrangler"
note = "Cloudflare Workers CLI (brew formula `wrangler` is the unrelated Erlang refactor tool, disabled upstream 2025-07-01)"
