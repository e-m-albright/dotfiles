# Package manifest for Homebrew setup.
# Source of truth for `dotfiles brew install` and `dotfiles stale`.
#
# Usage (env opt-in flags, default true):
#   AI=0 PRODUCTIVITY=0 SOCIAL=0 dotfiles brew install

[flags]
ai = true
productivity = true
social = true

[taps]
list = ["ariga/tap", "infisical/get-cli", "axiomhq/tap"]

# =============================================================================
# CLI Tools (formulae)
# =============================================================================

[[section]]
name = "Core CLI"
kind = "formula"
packages = [
  { name = "git",                  note = "Version control" },
  { name = "git-lfs",              note = "Git Large File Storage" },
  { name = "git-delta",            note = "Beautiful git diffs (used by .gitconfig)" },
  { name = "gh",                   note = "GitHub CLI (PRs, issues, actions)" },
  { name = "jq",                   note = "JSON processor" },
  { name = "yq",                   note = "YAML processor (like jq for YAML)" },
  { name = "wget",                 note = "Web downloader" },
  { name = "openssl",              note = "TLS/crypto toolkit" },
  { name = "bash-completion@2",    note = "Bash completion" },
  { name = "helix",                note = "Postmodern modal terminal editor (Rust, batteries-included LSP/Treesitter — binary is `hx`)" },
  { name = "fd",                   note = "Fast file finder (yazi: find-by-name / `f`)" },
  { name = "ripgrep",              note = "Fast content search (yazi: find-in-files / `F`)" },
  { name = "fzf",                  note = "Fuzzy finder (yazi: interactive fuzzy jump)" },
  { name = "zoxide",               note = "Smart `cd` with frecency (yazi: `z` jump)" },
  { name = "yazi",                 note = "Blazing-fast terminal file manager (Rust)" },
  { name = "poppler",              note = "PDF preview (pdftoppm)" },
  { name = "resvg",                note = "SVG-to-PNG rasterizer" },
  { name = "imagemagick",          note = "Image conversion for long-tail formats (.heic, .psd, .tiff)" },
  { name = "chafa",                note = "Terminal image renderer (yazi inline image previews)" },
  { name = "sevenzip",             note = "Peek inside archives (.zip, .7z, .rar)" },
  { name = "ffmpeg",               note = "Video/audio thumbnails", disabled = true, reason = "~300MB+ with deps, rarely needed" },
  { name = "tmux",                 note = "Terminal multiplexer" },
  { name = "mosh",                 note = "Roaming SSH-compatible shell for phone connections" },
  { name = "zellij",               note = "Modern terminal workspace and multiplexer" },
  { name = "pandoc",               note = "Universal markup converter (md ↔ docx ↔ pdf ↔ html ↔ …)" },
]

[[section]]
name = "System CLI"
kind = "formula"
packages = [
  { name = "htop",               note = "System monitoring" },
  { name = "iftop",              note = "Network traffic monitoring" },
  { name = "nmap",               note = "Network mapping" },
  { name = "dockutil",           note = "Dock management" },
  { name = "terminal-notifier",  note = "macOS notifications from CLI (used by Claude Code hooks)" },
  { name = "duti",               note = "Set default app for file types (used by file-associations.sh)" },
]

[[section]]
name = "Developer Tools"
kind = "formula"
packages = [
  { name = "just",           note = "Command runner (like make, but simpler)" },
  { name = "lefthook",       note = "Git hooks (language-agnostic, parallel execution)" },
  { name = "shellcheck",     note = "Static analysis for shell scripts" },
  { name = "hyperfine",      note = "Command-line benchmarking tool" },
  { name = "graphite",       note = "Stacked PRs", disabled = true, reason = "removed, not useful enough (requires withgraphite/tap)" },
  { name = "atlas",          note = "Database schema migration tool (requires ariga/tap)" },
  { name = "duckdb",         note = "Fast analytical database (SQL for analytics)" },
  { name = "railway",        note = "Railway.app CLI (deploy, logs, manage projects)" },
  { name = "opentofu",       note = "Open-source Terraform alternative" },
  { name = "flyctl",         note = "Fly.io CLI (deploy, manage apps)" },
  { name = "ngrok",          note = "Secure tunnels to localhost (webhook testing, demos)" },
  { name = "neonctl",        note = "Neon Postgres CLI (projects, DBs, roles)" },
  { name = "infisical",      note = "Secrets management CLI (requires infisical/get-cli tap)" },
  { name = "git-filter-repo", note = "Git history rewriting (secrets scrub)", disabled = true },
  { name = "libpq",          note = "PostgreSQL client library (psql, pg_dump)" },
  { name = "sccache",        note = "Shared compilation cache (Rust/C/C++ build speedup)" },
  { name = "temporal",       note = "Temporal workflow CLI", disabled = true, reason = "Disabled 2026-06-01: experiment; reinstall if revisiting durable workflows" },
  { name = "pulumi",         note = "IaC in real languages", disabled = true, reason = "Disabled 2026-06-01: experiment; opentofu is the active IaC tool" },
  { name = "sentry-cli",     note = "Sentry error tracking (releases, source maps, deploys)", disabled = true },
  { name = "datadog-ci",     note = "Datadog CI test visibility & synthetics", disabled = true },
]

[[section]]
name = "Security"
kind = "formula"
packages = [
  { name = "gitleaks",     note = "Secret scanner: hardcoded creds in git history/working tree" },
  { name = "osv-scanner",  note = "Dependency CVE scanner (Google OSV database)" },
  { name = "semgrep",      note = "Static analysis / SAST: pattern-based code vulnerability rules" },
  { name = "trivy",        note = "Vulnerability + misconfig scanner (containers, IaC, filesystems)" },
]

[[section]]
name = "Node.js"
kind = "formula"
packages = [
  { name = "fnm", note = "Fast Node Manager (node version switching)" },
]

[[section]]
name = "Go"
kind = "formula"
packages = [
  { name = "go",             note = "Go programming language" },
  { name = "golangci-lint",  note = "Go linter aggregator" },
]

[[section]]
name = "Python"
kind = "formula"
packages = [
  { name = "uv",     note = "Python package/installer & the dotfiles CLI runtime. Bootstrap prerequisite (installed before this manifest runs); declared here for documentation + stale-suppression." },
  { name = "py-spy", note = "Sampling profiler for Python programs" },
]

