name: Secret Scan

# This repo is public. Two layers, both detection-only (a finding fails the run;
# nothing is ever rewritten): on every PR/push gitleaks scans the new commits so
# a secret is caught before it lands, and the weekly scheduled run (fetch-depth 0)
# re-scans the ENTIRE history in case something slipped in earlier.
# Ledger: docs/health/cli/findings.md (shell/product-coverage gaps).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1" # weekly, Monday morning UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history — the whole point of this scan

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
