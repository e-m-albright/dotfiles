name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Syntax check all shell scripts
        run: |
          find . -name '*.sh' -not -path './.git/*' | while read -r f; do
            bash -n "$f" || exit 1
          done
          echo "All shell scripts pass syntax check"

      - name: Validate JSON files
        run: |
          # Editor settings are JSONC and intentionally excluded.
          find . -name '*.json' \
            -not -path './.git/*' \
            -not -path './.claude/*' \
            -not -path './editors/*' | while read -r f; do
            python3 -m json.tool "$f" >/dev/null || exit 1
          done
          echo "All JSON files are valid"

      - name: Check for secrets patterns
        run: |
          PATTERNS="password=|api_key=|secret_key=|AWS_SECRET|PRIVATE_KEY"
          if grep -rn --include='*.sh' --include='*.json' --include='*.yaml' -E "$PATTERNS" . --exclude-dir=.git; then
            echo "::warning::Possible secrets found in committed files"
          fi

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master, 2026-07-15
        with:
          severity: warning
          ignore_paths: ".git"

  # The same Python quality recipes lefthook runs locally.
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Quality gate (fmt, lint, types, deadcode, complexity, tests)
        run: just check
      - name: Dependency vulnerability audit (pip-audit)
        run: just audit

  # Clean-machine rehearsal for the read-only doctor command.
  # Non-zero exits are expected (a clean box has gaps to report); a traceback is not.
  # NOTE: full install.sh is macOS-specific and not rehearsed here.
  clean-machine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install the dotfiles CLI
        working-directory: cli
        run: uv sync --frozen
      - name: Rehearse doctor against a clean HOME
        working-directory: cli
        run: |
          set -u
          home="$(mktemp -d)"
          bin=".venv/bin/dotfiles"
          fail=0
          check() {  # <label> <args...> — fails the job only on a Python traceback
            local label="$1"; shift
            echo "::group::dotfiles $label (clean HOME)"
            HOME="$home" timeout 150 "$bin" "$@" >out.txt 2>&1 || echo "(exit $? — tolerated unless traceback)"
            cat out.txt
            if grep -q 'Traceback (most recent call last)' out.txt; then
              echo "::error::dotfiles $label crashed with a traceback on a clean machine"
              fail=1
            fi
            echo "::endgroup::"
          }
          check "doctor" doctor
          exit "$fail"
