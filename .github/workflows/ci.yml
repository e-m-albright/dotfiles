name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Syntax check all shell scripts
        run: |
          find . -name '*.sh' -not -path './.git/*' | while read -r f; do
            bash -n "$f" || exit 1
          done
          echo "All shell scripts pass syntax check"

      - name: Validate JSON files
        run: |
          # Skip JSONC configs (// comments): editors/ (VS Code/Cursor) and Pi's
          # models.json — both are JSONC by design and not strict JSON.
          find . -name '*.json' \
            -not -path './.git/*' \
            -not -path './.claude/*' \
            -not -path './editors/*' \
            -not -path './ai/agents/pi/models.json' | while read -r f; do
            python3 -m json.tool "$f" >/dev/null || exit 1
          done
          echo "All JSON files are valid"

      - name: Validate YAML files
        run: |
          find . -name '*.yaml' -o -name '*.yml' | grep -v '.git/' | while read -r f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done
          echo "All YAML files are valid"

      - name: Check for secrets patterns
        run: |
          PATTERNS="password=|api_key=|secret_key=|AWS_SECRET|PRIVATE_KEY"
          if grep -rn --include='*.sh' --include='*.json' --include='*.yaml' -E "$PATTERNS" . --exclude-dir=.git; then
            echo "::warning::Possible secrets found in committed files"
          fi

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          ignore_paths: ".git"

  # The Python health gate — same recipes lefthook runs locally, so CI enforces
  # the ratchet/complexity/coverage floor instead of trusting every contributor's
  # hooks. "CI calls task-runner recipes; YAML holds zero logic." (engineering-gates §3)
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: extractions/setup-just@v4
      - name: Health + quality gate (fmt, lint, types, deadcode, complexity, ratchet, tests)
        run: just check
      - name: Validate skill/agent markdown (catches silent frontmatter-drop on deploy)
        run: just lint-agents

  # Clean-machine rehearsal — runs the agentic deploy + health commands against a
  # fresh $HOME with no vendor tools installed. Unit tests run on a configured dev
  # box and miss the non-hermetic-crash class (e.g. a probe that dies on an absent
  # ~/.claude or a live MCP 405); this proves the commands degrade gracefully — no
  # unhandled traceback — on the kind of machine the repo exists to bootstrap.
  # Non-zero exits are expected (a clean box has gaps to report); a traceback is not.
  # NOTE: full install.sh is macOS-specific and not rehearsed here.
  clean-machine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install the dotfiles CLI
        working-directory: cli
        run: uv sync --frozen
      - name: Rehearse agent deploy + health against a clean HOME
        working-directory: cli
        run: |
          set -u
          home="$(mktemp -d)"
          bin=".venv/bin/dotfiles"
          fail=0
          check() {  # <label> <args...> — fails the job only on a Python traceback
            local label="$1"; shift
            echo "::group::dotfiles $label (clean HOME)"
            HOME="$home" timeout 150 "$bin" "$@" >out.txt 2>&1 || echo "(exit $? — tolerated unless traceback)"
            cat out.txt
            if grep -q 'Traceback (most recent call last)' out.txt; then
              echo "::error::dotfiles $label crashed with a traceback on a clean machine"
              fail=1
            fi
            echo "::endgroup::"
          }
          check "agent setup" agent setup
          check "agent overview" agent overview
          check "agent verify" agent verify --offline
          check "doctor" doctor
          exit "$fail"
