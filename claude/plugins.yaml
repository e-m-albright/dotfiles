# Claude Code plugins to enable in ~/.claude/settings.json
# Default marketplace: claude-plugins-official (bare names get this suffix)
# For other marketplaces: use name@marketplace format
# Run: ~/dotfiles/claude/setup.sh (or install.sh will do it automatically)
#
# To add a plugin: add it here and re-run setup.sh
# To disable a plugin: remove it and re-run setup.sh (or toggle in Claude Code)

