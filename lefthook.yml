# Lefthook git hooks for dotfiles repo
# Install hooks: lefthook install

pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "*.sh"
      run: |
        for f in {staged_files}; do
          shellcheck -S warning "$f" 2>/dev/null || true
        done
    syntax-check:
      glob: "*.sh"
      run: |
        for f in {staged_files}; do
          bash -n "$f"
        done
    yaml-lint:
      glob: "*.{yaml,yml}"
      run: |
        for f in {staged_files}; do
          yq eval '.' "$f" >/dev/null 2>&1 || echo "Invalid YAML: $f"
        done
    json-lint:
      glob: "*.json"
      run: |
        for f in {staged_files}; do
          jq '.' "$f" >/dev/null 2>&1 || echo "Invalid JSON: $f"
        done
    cli-check:
      glob: "cli/**/*.py"
      run: just check --fast
    agent-lint:
      glob: "ai/{skills,subagents,agents}/**/*.md"
      run: just lint-agents
    voice:
      # *.md gets the slop-phrase block; code gets the em-dash advisory (warn).
      glob: "*.{md,py,sh,ts,tsx,rs,go,js,mjs}"
      run: just lint-prose {staged_files}

commit-msg:
  commands:
    voice:
      run: just lint-prose {1}

pre-push:
  commands:
    cli-full-check:
      glob: "cli/**/*.py"
      run: just check
