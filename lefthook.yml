# Lefthook git hooks for dotfiles repo
# Install hooks: lefthook install

pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "*.sh"
      run: |
        for f in {staged_files}; do
          shellcheck -S warning "$f" 2>/dev/null || true
        done
    syntax-check:
      glob: "*.sh"
      run: |
        for f in {staged_files}; do
          bash -n "$f"
        done
    yaml-lint:
      glob: "*.{yaml,yml}"
      run: |
        for f in {staged_files}; do
          yq eval '.' "$f" >/dev/null 2>&1 || echo "Invalid YAML: $f"
        done
    json-lint:
      glob: "*.json"
      run: |
        for f in {staged_files}; do
          jq '.' "$f" >/dev/null 2>&1 || echo "Invalid JSON: $f"
        done
    baselines:
      # Code-health ratchet. Counts can only decrease; file ceilings can only
      # decrease. Run `python3 scripts/check_baselines.py --auto-ratchet` to
      # lock in improvements after a cleanup. See docs/engineering-philosophy.md.
      run: python3 scripts/check_baselines.py
